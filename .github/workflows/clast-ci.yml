name: Clast CI

# Build + test Google.Api.Gax / Google.Api.Gax.Rest / Google.Api.Gax.Grpc. These reference the locally-ported
# Google.Apis.* libraries via cross-repo ProjectReferences, so google-api-dotnet-client is checked out as a sibling.
# The dependency is taken from the PR's branch if a same-named branch exists there (so coordinated cross-repo PRs
# validate together), otherwise from main. Tests run with the Clast flag OFF (original identity). net8.0 on all OSes;
# net462 on Windows. Gax.Grpc is also built across all TFMs so the net10.0 IsAotCompatible analyzer runs in CI.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Checkout gax-dotnet
        uses: actions/checkout@v6
        with:
          path: gax-dotnet

      - name: Resolve dependency refs
        id: dep
        shell: bash
        run: |
          HEAD="${{ github.head_ref }}"
          resolve() {
            local repo="$1" ref="main"
            if [ -n "$HEAD" ] && git ls-remote --exit-code --heads \
              "https://github.com/clast-project/$repo.git" "$HEAD" >/dev/null 2>&1; then
              ref="$HEAD"
            fi
            echo "$ref"
          }
          echo "api=$(resolve google-api-dotnet-client)" >> "$GITHUB_OUTPUT"
          echo "grpc=$(resolve grpc-dotnet)" >> "$GITHUB_OUTPUT"

      - name: Checkout google-api-dotnet-client (dependency, as sibling)
        uses: actions/checkout@v6
        with:
          repository: clast-project/google-api-dotnet-client
          ref: ${{ steps.dep.outputs.api }}
          path: google-api-dotnet-client

      - name: Checkout grpc-dotnet (dependency, as sibling)
        uses: actions/checkout@v6
        with:
          repository: clast-project/grpc-dotnet
          ref: ${{ steps.dep.outputs.grpc }}
          path: grpc-dotnet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build Google.Api.Gax.Grpc (all TFMs incl. net10.0 AOT analyzer)
        shell: bash
        working-directory: gax-dotnet
        run: dotnet build Google.Api.Gax.Grpc/Google.Api.Gax.Grpc.csproj -c Release

      - name: Test
        shell: bash
        working-directory: gax-dotnet
        run: |
          dotnet test Google.Api.Gax.Tests/Google.Api.Gax.Tests.csproj -c Release
          dotnet test Google.Api.Gax.Grpc.Tests/Google.Api.Gax.Grpc.Tests.csproj -c Release
