name: Clast CI

# Build + test Google.Api.Gax / Google.Api.Gax.Rest. These reference the locally-ported Google.Apis.* libraries
# via cross-repo ProjectReferences, so google-api-dotnet-client is checked out as a sibling. The dependency is
# taken from the PR's branch if a same-named branch exists there (so coordinated cross-repo PRs validate together),
# otherwise from main. Tests run with the Clast flag OFF (original identity). net8.0 on all OSes; net462 on Windows.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Checkout gax-dotnet
        uses: actions/checkout@v6
        with:
          path: gax-dotnet

      - name: Resolve google-api-dotnet-client ref
        id: dep
        shell: bash
        run: |
          REF=main
          HEAD="${{ github.head_ref }}"
          if [ -n "$HEAD" ] && git ls-remote --exit-code --heads \
            https://github.com/clast-project/google-api-dotnet-client.git "$HEAD" >/dev/null 2>&1; then
            REF="$HEAD"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Using google-api-dotnet-client@$REF"

      - name: Checkout google-api-dotnet-client (dependency, as sibling)
        uses: actions/checkout@v6
        with:
          repository: clast-project/google-api-dotnet-client
          ref: ${{ steps.dep.outputs.ref }}
          path: google-api-dotnet-client

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Test
        shell: bash
        working-directory: gax-dotnet
        run: dotnet test Google.Api.Gax.Tests/Google.Api.Gax.Tests.csproj -c Release
